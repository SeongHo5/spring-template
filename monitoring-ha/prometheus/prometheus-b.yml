global:
  # 메트릭 수집 주기
  scrape_interval: 15s
  # 알람 룰 평가 주기
  evaluation_interval: 30s
  external_labels:
    # HA 구성을 식별하기 위한 공통 라벨
    cluster: monitoring-ha
    # 인스턴스 구분 라벨 (A/B)
    replica: prometheus-b

rule_files:
  - /etc/prometheus/rules.yml

alerting:
  # replica 라벨을 제거해서 Alertmanager에서 A/B 중복 알림을 dedup 하도록 설정
  alert_relabel_configs:
    - action: labeldrop
      regex: replica
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager-1:9093
            - alertmanager-2:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus-b:9090

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
