services:
  prometheus-a:
    # Prometheus HA 인스턴스 A
    image: prom/prometheus:v2.51.2
    container_name: monitoring-ha-prometheus-a
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus-a.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus-a-data:/prometheus
    ports:
      - "19090:9090"
    depends_on:
      - node-exporter
      - alertmanager-1
      - alertmanager-2

  prometheus-b:
    # Prometheus HA 인스턴스 B
    image: prom/prometheus:v2.51.2
    container_name: monitoring-ha-prometheus-b
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus-b.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus-b-data:/prometheus
    ports:
      - "29090:9090"
    depends_on:
      - node-exporter
      - alertmanager-1
      - alertmanager-2

  alertmanager-1:
    # Alertmanager HA 인스턴스 1
    image: prom/alertmanager:v0.27.0
    container_name: monitoring-ha-alertmanager-1
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --cluster.listen-address=0.0.0.0:9094
      - --cluster.peer=alertmanager-2:9094
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./alertmanager/templates:/etc/alertmanager/templates:ro
      - alertmanager-1-data:/alertmanager
    ports:
      - "19093:9093"

  alertmanager-2:
    # Alertmanager HA 인스턴스 2
    image: prom/alertmanager:v0.27.0
    container_name: monitoring-ha-alertmanager-2
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --cluster.listen-address=0.0.0.0:9094
      - --cluster.peer=alertmanager-1:9094
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./alertmanager/templates:/etc/alertmanager/templates:ro
      - alertmanager-2-data:/alertmanager
    ports:
      - "29093:9093"

  node-exporter:
    # 호스트 리소스 메트릭 수집
    image: quay.io/prometheus/node-exporter:v1.8.1
    container_name: monitoring-ha-node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
      - --collector.systemd
      - --collector.processes
    pid: host
    volumes:
      - /:/host:ro,rslave
    ports:
      - "19100:9100"

  # 필요할 때만 활성화:
  # docker compose --profile ui up -d
  grafana:
    image: grafana/grafana:10.4.2
    container_name: monitoring-ha-grafana
    restart: unless-stopped
    profiles:
      - ui
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "13000:3000"
    depends_on:
      - prometheus-a
      - prometheus-b

volumes:
  prometheus-a-data:
  prometheus-b-data:
  alertmanager-1-data:
  alertmanager-2-data:
  grafana-data:
