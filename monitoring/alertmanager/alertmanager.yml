global:
  # 알람 해제(resolve) 상태 처리 시 대기 시간
  resolve_timeout: 5m
  # SMTP 서버 주소
  smtp_smarthost: "smtp.mailplug.co.kr:465"
  smtp_from: "no-reply@pntbiz.com"
  smtp_auth_username: "no-reply@pntbiz.com"
  smtp_auth_password: "YOUR_PASSWORD"
  smtp_require_tls: true

templates:
  - /etc/alertmanager/templates/*.tmpl

route:
  receiver: email-default
  group_by: ["alertname", "job", "instance"]
  # 첫 알림 전 대기
  group_wait: 30s
  # 같은 그룹 내 추가 알림 묶음 주기
  group_interval: 5m
  # 동일 알람 재전송 주기
  repeat_interval: 4h
  routes:
    # CRITICAL은 별도 수신자로 라우팅 분리
    - receiver: email-critical
      matchers:
        - severity="critical"
      repeat_interval: 30m

receivers:
  # 기본 경고/알람 메일 수신자
  - name: email-default
    email_configs:
        # 수신자 메일 주소 (여러 개인 경우 콤마(,)로 구분)
      - to: "YOUR_EMAIL@pntbiz.com"
        # 알람 해제 시점에도 메일 발송
        send_resolved: true
        headers:
          # 템플릿 기반 제목
          subject: '{{ template "email.default.subject" . }}'
        # 템플릿 기반 HTML 본문
        html: '{{ template "email.default.html" . }}'

  # CRITICAL 알림 전용 수신자
  - name: email-critical
    email_configs:
        # 수신자 메일 주소 (여러 개인 경우 콤마(,)로 구분)
      - to: "YOUR_EMAIL@pntbiz.com"
        send_resolved: true
        headers:
          subject: '{{ template "email.default.subject" . }}'
        html: '{{ template "email.default.html" . }}'

inhibit_rules:
  # 같은 alertname/instance에서 critical 발생 시 warning 알림 억제
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - alertname
      - instance
