global:
  # 알람 해제(resolve) 상태 처리 시 대기 시간
  resolve_timeout: 5m
  # SMTP 서버 주소 (예: Gmail SMTP, 사내 SMTP)
  smtp_smarthost: "smtp.example.com:587"
  # 발신자 주소
  smtp_from: "monitor@example.com"
  # SMTP 인증 계정/비밀번호
  smtp_auth_username: "monitor@example.com"
  smtp_auth_password: "CHANGE_ME"
  # SMTP TLS 사용 여부
  smtp_require_tls: true

templates:
  # 메일 제목/본문 템플릿 파일 경로
  - /etc/alertmanager/templates/*.tmpl

route:
  # 기본 수신자
  receiver: email-default
  # 같은 그룹으로 묶을 라벨 키
  group_by: ["alertname", "job", "instance"]
  # 첫 알림 전 대기
  group_wait: 30s
  # 같은 그룹 내 추가 알림 묶음 주기
  group_interval: 5m
  # 동일 알람 재전송 주기
  repeat_interval: 4h
  routes:
    # severity=critical 은 별도 수신자로 라우팅
    - receiver: email-critical
      matchers:
        - severity="critical"
      repeat_interval: 30m

receivers:
  # 기본 경고/알람 메일 수신
  - name: email-default
    email_configs:
      - to: "oncall@example.com"
        # 알람 해제 시점에도 메일 발송
        send_resolved: true
        headers:
          # 템플릿 기반 제목
          subject: '{{ template "email.default.subject" . }}'
        # 템플릿 기반 HTML 본문
        html: '{{ template "email.default.html" . }}'

  # 치명(CRITICAL) 알람 전용 수신자
  - name: email-critical
    email_configs:
      - to: "oncall@example.com,manager@example.com"
        send_resolved: true
        headers:
          subject: '{{ template "email.critical.subject" . }}'
        html: '{{ template "email.default.html" . }}'

inhibit_rules:
  # 같은 alertname/instance에서 critical 발생 시 warning 알림 억제
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - alertname
      - instance
